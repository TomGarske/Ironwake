name: Build Steam Playtest

on:
  push:
    branches:
      - main

jobs:
  export:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GODOT_VERSION: "4.6.1"
      EXPORT_PRESET_NAME: "Windows Desktop"
      BUILD_OUTPUT_DIR: "build/windows"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          include-templates: true
          use-dotnet: true

      - name: Verify Godot CLI
        shell: pwsh
        run: |
          if ($env:GODOT4) { Write-Host "GODOT4=$env:GODOT4" }
          if ($env:GODOT) { Write-Host "GODOT=$env:GODOT" }
          try { godot --version } catch { Write-Host "godot command not in PATH" }
          try { godot4 --version } catch { Write-Host "godot4 command not in PATH" }

      - name: Install GDExtensions (GodotSteam)
        shell: pwsh
        run: |
          ./tools/ci/setup-extensions.ps1 -ProjectRoot "$PWD"

      - name: Export Windows build
        shell: pwsh
        run: |
          ./tools/ci/export-windows.ps1 `
            -ProjectRoot "$PWD" `
            -ExportPresetName "${env:EXPORT_PRESET_NAME}" `
            -OutputDir "${env:BUILD_OUTPUT_DIR}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-playtest-windows
          path: build/windows/
          retention-days: 7
