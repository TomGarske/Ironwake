name: ADR Governance

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-metadata-gate:
    name: PR Metadata Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required PR metadata
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/ci/check_pr_metadata.py

