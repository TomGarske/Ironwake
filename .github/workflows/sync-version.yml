name: Sync Version From Commit

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

jobs:
  sync-version:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update project version to commit SHA
        id: update
        shell: bash
        run: |
          base_version="0.1.0"
          short_sha="${GITHUB_SHA::7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"

          python - <<'PY'
          import pathlib
          import re
          import os

          path = pathlib.Path("project.godot")
          text = path.read_text(encoding="utf-8")
          base_version = "0.1.0"
          short_sha = os.environ["GITHUB_SHA"][:7]
          new_line = f'config/version="{base_version} ({short_sha})"'

          if re.search(r'^config/version="[^"]*"$', text, flags=re.MULTILINE):
              updated = re.sub(r'^config/version="[^"]*"$', new_line, text, count=1, flags=re.MULTILINE)
          else:
              updated = text.replace('config/name="BurnBridgers"', 'config/name="BurnBridgers"\n' + new_line, 1)

          if updated != text:
              path.write_text(updated, encoding="utf-8")
          PY

          if git diff --quiet -- project.godot; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push version update
        if: ${{ steps.update.outputs.changed == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(version): sync config/version to ${{ steps.update.outputs.base_version }} (${{ steps.update.outputs.short_sha }}) [skip ci]"
          file_pattern: project.godot
