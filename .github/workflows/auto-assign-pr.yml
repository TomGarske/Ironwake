name: Auto Assign PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  assign:
    name: Assign PR to TomGarske
    runs-on: ubuntu-latest
    steps:
      - name: Add assignee
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: ["TomGarske"],
            });
